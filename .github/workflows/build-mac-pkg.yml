name: Build Mac PKG Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build-pkg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile SwiftUI app
        run: |
          VERSION="${{ github.event.inputs.version }}"
          APP_DIR="payload/Applications/CrawlStation Worker.app"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          # Info.plist
          cat > "${APP_DIR}/Contents/Info.plist" << PLIST_EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>CrawlStationWorker</string>
              <key>CFBundleIdentifier</key>
              <string>com.crawlstation.worker.app</string>
              <key>CFBundleName</key>
              <string>CrawlStation Worker</string>
              <key>CFBundleDisplayName</key>
              <string>CrawlStation Worker</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>LSMinimumSystemVersion</key>
              <string>13.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSSupportsAutomaticTermination</key>
              <false/>
          </dict>
          </plist>
          PLIST_EOF

          # 앱 아이콘 생성 (프로그래밍 방식)
          cat > /tmp/gen_icon.swift << 'ICON_EOF'
          import Cocoa

          let sizes: [(Int, String)] = [
              (16, "icon_16x16.png"),
              (32, "icon_16x16@2x.png"),
              (32, "icon_32x32.png"),
              (64, "icon_32x32@2x.png"),
              (128, "icon_128x128.png"),
              (256, "icon_128x128@2x.png"),
              (256, "icon_256x256.png"),
              (512, "icon_256x256@2x.png"),
              (512, "icon_512x512.png"),
              (1024, "icon_512x512@2x.png"),
          ]

          let iconsetPath = "/tmp/AppIcon.iconset"
          try? FileManager.default.createDirectory(atPath: iconsetPath, withIntermediateDirectories: true)

          for (size, name) in sizes {
              let img = NSImage(size: NSSize(width: size, height: size))
              img.lockFocus()

              // Background rounded rect
              let bgPath = NSBezierPath(roundedRect: NSRect(x: 0, y: 0, width: size, height: size),
                                         xRadius: CGFloat(size) * 0.22, yRadius: CGFloat(size) * 0.22)
              let gradient = NSGradient(colors: [
                  NSColor(red: 0.2, green: 0.4, blue: 0.9, alpha: 1),
                  NSColor(red: 0.1, green: 0.3, blue: 0.8, alpha: 1)
              ])!
              gradient.draw(in: bgPath, angle: -45)

              // "CW" text
              let fontSize = CGFloat(size) * 0.38
              let attrs: [NSAttributedString.Key: Any] = [
                  .font: NSFont.systemFont(ofSize: fontSize, weight: .bold),
                  .foregroundColor: NSColor.white
              ]
              let text = "CW" as NSString
              let textSize = text.size(withAttributes: attrs)
              let textRect = NSRect(
                  x: (CGFloat(size) - textSize.width) / 2,
                  y: (CGFloat(size) - textSize.height) / 2,
                  width: textSize.width,
                  height: textSize.height
              )
              text.draw(in: textRect, withAttributes: attrs)

              img.unlockFocus()

              guard let tiff = img.tiffRepresentation,
                    let rep = NSBitmapImageRep(data: tiff),
                    let png = rep.representation(using: .png, properties: [:]) else { continue }
              try? png.write(to: URL(fileURLWithPath: "\(iconsetPath)/\(name)"))
          }
          ICON_EOF
          swiftc -framework Cocoa /tmp/gen_icon.swift -o /tmp/gen_icon && /tmp/gen_icon
          iconutil -c icns /tmp/AppIcon.iconset -o "${APP_DIR}/Contents/Resources/AppIcon.icns"

          # SwiftUI 앱 컴파일
          swiftc \
            -O \
            -parse-as-library \
            -whole-module-optimization \
            -sdk $(xcrun --show-sdk-path) \
            -target arm64-apple-macos13 \
            mac-app/CrawlStationWorker.swift \
            -o "${APP_DIR}/Contents/MacOS/CrawlStationWorker-arm64"

          swiftc \
            -O \
            -parse-as-library \
            -whole-module-optimization \
            -sdk $(xcrun --show-sdk-path) \
            -target x86_64-apple-macos13 \
            mac-app/CrawlStationWorker.swift \
            -o "${APP_DIR}/Contents/MacOS/CrawlStationWorker-x86_64"

          # Universal Binary
          lipo -create \
            "${APP_DIR}/Contents/MacOS/CrawlStationWorker-arm64" \
            "${APP_DIR}/Contents/MacOS/CrawlStationWorker-x86_64" \
            -output "${APP_DIR}/Contents/MacOS/CrawlStationWorker"

          rm "${APP_DIR}/Contents/MacOS/CrawlStationWorker-arm64" \
             "${APP_DIR}/Contents/MacOS/CrawlStationWorker-x86_64"

          chmod +x "${APP_DIR}/Contents/MacOS/CrawlStationWorker"
          echo "App bundle created at: ${APP_DIR}"

      - name: Create postinstall script
        run: |
          mkdir -p scripts
          cat > scripts/postinstall << 'SCRIPT_EOF'
          #!/bin/bash
          set -euo pipefail

          # ── 사용자 감지 (root로 실행되므로 실제 사용자 찾기) ──
          REAL_USER="${USER}"
          if [ "$REAL_USER" = "root" ]; then
              REAL_USER=$(stat -f "%Su" /dev/console 2>/dev/null || echo "$SUDO_USER")
          fi
          REAL_HOME=$(eval echo "~${REAL_USER}")

          INSTALL_DIR="${REAL_HOME}/CrawlWorker"
          STATION_URL="__STATION_URL__"
          SUPABASE_URL="__SUPABASE_URL__"
          SUPABASE_KEY="__SUPABASE_KEY__"
          PLIST_LABEL="com.crawlstation.worker"
          PLIST_PATH="${REAL_HOME}/Library/LaunchAgents/${PLIST_LABEL}.plist"
          LOG_DIR="${INSTALL_DIR}/logs"
          INSTALL_LOG="${INSTALL_DIR}/install.log"

          # ── 로그 (파일 + stdout 동시 출력) ──
          sudo -u "$REAL_USER" mkdir -p "${INSTALL_DIR}/handlers" "${LOG_DIR}"
          log() {
              echo "[$(date '+%H:%M:%S')] $1" | tee -a "${INSTALL_LOG}"
          }
          log "=== CrawlStation Worker 설치 시작 ==="
          log "사용자: ${REAL_USER}, 홈: ${REAL_HOME}"

          # ── 1. Python 확인/설치 ──
          export PATH="/Library/Frameworks/Python.framework/Versions/3.12/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          find_python() {
              for p in python3.12 python3; do
                  local PY=$(command -v "$p" 2>/dev/null || true)
                  if [ -n "$PY" ]; then
                      local VER=$("$PY" -c "import sys; v=sys.version_info; print(f'{v.major}.{v.minor}')" 2>/dev/null || echo "0.0")
                      local MAJOR=$(echo "$VER" | cut -d. -f1)
                      local MINOR=$(echo "$VER" | cut -d. -f2)
                      if [ "$MAJOR" -ge 3 ] && [ "$MINOR" -ge 10 ]; then
                          echo "$PY"
                          return 0
                      fi
                  fi
              done
              return 1
          }

          PYTHON3=$(find_python || true)
          if [ -z "$PYTHON3" ]; then
              log "Python 3.10+ 없음 — 설치 시작"
              # Homebrew 시도
              if sudo -u "$REAL_USER" bash -c 'command -v brew' &>/dev/null; then
                  log "Homebrew로 Python 설치..."
                  sudo -u "$REAL_USER" brew install python@3.12 2>>"${INSTALL_LOG}" || true
                  PYTHON3=$(find_python || true)
              fi
              # 공식 인스톨러 fallback
              if [ -z "$PYTHON3" ]; then
                  log "Python 공식 인스톨러 다운로드..."
                  curl -fSL "https://www.python.org/ftp/python/3.12.8/python-3.12.8-macos11.pkg" -o /tmp/python.pkg 2>>"${INSTALL_LOG}"
                  installer -pkg /tmp/python.pkg -target / >>"${INSTALL_LOG}" 2>&1
                  rm -f /tmp/python.pkg
                  rm -rf "/Applications/IDLE.app" "/Applications/Python Launcher.app" 2>/dev/null || true
                  hash -r 2>/dev/null || true
                  PYTHON3=$(find_python || true)
              fi
          fi

          if [ -z "$PYTHON3" ]; then
              log "ERROR: Python 설치 실패 — 수동으로 python.org에서 Python 3.12를 설치해주세요"
              exit 1
          fi
          log "Python: $($PYTHON3 --version) ($PYTHON3)"

          # ── 2. pip 패키지 설치 (재시도 포함) ──
          install_pip_pkg() {
              local PKG="$1"
              sudo -u "$REAL_USER" "$PYTHON3" -m pip install --quiet "$PKG" 2>>"${INSTALL_LOG}" && return 0
              sudo -u "$REAL_USER" "$PYTHON3" -m pip install --quiet --break-system-packages "$PKG" 2>>"${INSTALL_LOG}" && return 0
              log "WARNING: $PKG 설치 실패 — pip 업그레이드 후 재시도"
              sudo -u "$REAL_USER" "$PYTHON3" -m pip install --upgrade pip 2>>"${INSTALL_LOG}" || true
              sudo -u "$REAL_USER" "$PYTHON3" -m pip install --quiet --break-system-packages "$PKG" 2>>"${INSTALL_LOG}" && return 0
              log "ERROR: $PKG 설치 최종 실패"
              return 1
          }

          log "pip 패키지 설치..."
          install_pip_pkg playwright || true
          install_pip_pkg supabase || true
          log "pip 패키지 완료"

          # ── 3. Chromium 설치 ──
          log "Chromium 브라우저 설치..."
          sudo -u "$REAL_USER" "$PYTHON3" -m playwright install chromium >>"${INSTALL_LOG}" 2>&1 || {
              log "WARNING: Chromium 설치 실패 — 재시도"
              sudo -u "$REAL_USER" "$PYTHON3" -m playwright install chromium >>"${INSTALL_LOG}" 2>&1 || {
                  log "WARNING: Chromium 설치 최종 실패 (워커 시작 후 자동 재시도됨)"
              }
          }
          log "Chromium 완료"

          # ── 4. 워커 파일 다운로드 (검증 포함) ──
          log "워커 파일 다운로드..."
          FILES="worker.py handlers/__init__.py handlers/base.py handlers/kin.py handlers/blog.py handlers/serp.py handlers/area.py handlers/deep.py handlers/rank.py supabase_rest.py"
          DOWNLOAD_OK=0
          DOWNLOAD_FAIL=0
          for f in $FILES; do
              TARGET="${INSTALL_DIR}/${f}"
              sudo -u "$REAL_USER" mkdir -p "$(dirname "${TARGET}")"
              # 최대 3회 재시도
              SUCCESS=false
              for attempt in 1 2 3; do
                  if sudo -u "$REAL_USER" curl -fsSL "${STATION_URL}/api/download?file=${f}" -o "${TARGET}" 2>>"${INSTALL_LOG}"; then
                      # 파일 크기 검증 (100바이트 미만이면 실패로 간주)
                      FSIZE=$(wc -c < "${TARGET}" 2>/dev/null || echo 0)
                      if [ "$FSIZE" -gt 100 ]; then
                          SUCCESS=true
                          break
                      fi
                      log "WARNING: ${f} 다운로드 크기 이상 (${FSIZE}B) — 재시도 ${attempt}/3"
                  else
                      log "WARNING: ${f} 다운로드 실패 — 재시도 ${attempt}/3"
                  fi
                  sleep 2
              done
              if $SUCCESS; then
                  DOWNLOAD_OK=$((DOWNLOAD_OK + 1))
              else
                  DOWNLOAD_FAIL=$((DOWNLOAD_FAIL + 1))
                  log "ERROR: ${f} 다운로드 최종 실패"
              fi
          done
          log "다운로드 완료: ${DOWNLOAD_OK}개 성공, ${DOWNLOAD_FAIL}개 실패"

          if [ "$DOWNLOAD_FAIL" -gt 2 ]; then
              log "ERROR: 핵심 파일 다운로드 실패가 너무 많습니다. 네트워크를 확인해주세요."
              exit 1
          fi

          # ── 5. .env 생성 (기존 있으면 유지) ──
          ENV_FILE="${INSTALL_DIR}/.env"
          if [ ! -f "${ENV_FILE}" ]; then
              WORKER_ID="worker-$("$PYTHON3" -c "import uuid; print(uuid.uuid4().hex[:8])")"
              printf "SUPABASE_URL=%s\nSUPABASE_KEY=%s\nWORKER_ID=%s\n" \
                  "${SUPABASE_URL}" "${SUPABASE_KEY}" "${WORKER_ID}" > "${ENV_FILE}"
              chown "$REAL_USER" "${ENV_FILE}"
              log "워커 ID 생성: ${WORKER_ID}"
          else
              WORKER_ID=$(grep WORKER_ID "${ENV_FILE}" | cut -d= -f2)
              log "기존 워커 ID 유지: ${WORKER_ID}"
          fi

          # ── 6. LaunchAgent 등록 ──
          sudo -u "$REAL_USER" launchctl unload "${PLIST_PATH}" 2>/dev/null || true
          sudo -u "$REAL_USER" mkdir -p "${REAL_HOME}/Library/LaunchAgents"

          cat > "${PLIST_PATH}" << PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key>
              <string>${PLIST_LABEL}</string>
              <key>ProgramArguments</key>
              <array>
                  <string>${PYTHON3}</string>
                  <string>-u</string>
                  <string>${INSTALL_DIR}/worker.py</string>
              </array>
              <key>WorkingDirectory</key>
              <string>${INSTALL_DIR}</string>
              <key>RunAtLoad</key>
              <true/>
              <key>KeepAlive</key>
              <dict>
                  <key>SuccessfulExit</key>
                  <false/>
              </dict>
              <key>ThrottleInterval</key>
              <integer>10</integer>
              <key>StandardOutPath</key>
              <string>${LOG_DIR}/worker.log</string>
              <key>StandardErrorPath</key>
              <string>${LOG_DIR}/worker.err</string>
              <key>EnvironmentVariables</key>
              <dict>
                  <key>PATH</key>
                  <string>/Library/Frameworks/Python.framework/Versions/3.12/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin</string>
              </dict>
          </dict>
          </plist>
          PLISTEOF
          chown "$REAL_USER" "${PLIST_PATH}"

          sudo -u "$REAL_USER" launchctl load "${PLIST_PATH}" 2>>"${INSTALL_LOG}" || {
              log "WARNING: LaunchAgent 로드 실패 — 수동 시작 필요"
          }

          # ── 7. 워커 시작 검증 (10초 대기) ──
          log "워커 시작 검증..."
          sleep 5
          if pgrep -f "CrawlWorker/worker.py" > /dev/null 2>&1; then
              log "워커 프로세스 실행 확인"
          else
              log "WARNING: 워커 프로세스 미감지 — 5초 더 대기"
              sleep 5
              if pgrep -f "CrawlWorker/worker.py" > /dev/null 2>&1; then
                  log "워커 프로세스 실행 확인"
              else
                  log "WARNING: 워커가 시작되지 않았습니다. 로그 확인: ${LOG_DIR}/worker.err"
                  log "--- worker.err ---"
                  tail -10 "${LOG_DIR}/worker.err" 2>/dev/null | tee -a "${INSTALL_LOG}" || true
              fi
          fi

          log "=== 설치 완료 ==="
          log "워커 ID: ${WORKER_ID}"
          log "로그: ${LOG_DIR}/worker.log"
          log "설치 로그: ${INSTALL_LOG}"
          SCRIPT_EOF
          chmod +x scripts/postinstall

      - name: Inject credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STATION_URL: ${{ secrets.STATION_URL }}
        run: |
          sed -i '' "s|__STATION_URL__|${STATION_URL:-https://crawl-station.vercel.app}|g" scripts/postinstall
          sed -i '' "s|__SUPABASE_URL__|${SUPABASE_URL}|g" scripts/postinstall
          sed -i '' "s|__SUPABASE_KEY__|${SUPABASE_KEY}|g" scripts/postinstall

      - name: Build .pkg
        run: |
          VERSION="${{ github.event.inputs.version }}"

          pkgbuild \
            --root payload \
            --scripts scripts \
            --identifier com.crawlstation.worker \
            --version "${VERSION}" \
            --install-location / \
            component.pkg

          mkdir -p resources
          cat > resources/welcome.html << 'HTML_EOF'
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"></head>
          <body style="font-family:-apple-system,sans-serif;padding:20px;">
          <h2>CrawlStation Worker</h2>
          <p>크롤링 워커를 설치합니다.</p>
          <ul>
              <li>Python 자동 설치 (없는 경우)</li>
              <li>Chromium 브라우저 자동 설치</li>
              <li>백그라운드 서비스 자동 등록</li>
              <li>Mac 부팅 시 자동 시작</li>
          </ul>
          <p><b>설치 후:</b> Launchpad 또는 Applications에서<br/>
          「CrawlStation Worker」 앱으로 제어할 수 있습니다.</p>
          </body></html>
          HTML_EOF

          cat > resources/conclusion.html << 'HTML_EOF'
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"></head>
          <body style="font-family:-apple-system,sans-serif;padding:20px;">
          <h2>설치 완료!</h2>
          <p>워커가 지금 백그라운드에서 실행 중입니다.</p>
          <ul>
              <li>지금 바로 실행됨 (재부팅 불필요)</li>
              <li>Mac 켤 때마다 자동 시작</li>
              <li>오류 발생 시 자동 재시작</li>
              <li>새 버전 자동 업데이트</li>
          </ul>
          <p><b>제어:</b> Applications → CrawlStation Worker 앱 실행</p>
          <p><b>삭제:</b> 앱에서 「삭제」 버튼 클릭</p>
          </body></html>
          HTML_EOF

          cat > distribution.xml << DIST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>CrawlStation Worker</title>
              <welcome file="welcome.html" mime-type="text/html"/>
              <conclusion file="conclusion.html" mime-type="text/html"/>
              <options customize="never" require-scripts="false"/>
              <choices-outline>
                  <line choice="com.crawlstation.worker"/>
              </choices-outline>
              <choice id="com.crawlstation.worker" visible="false">
                  <pkg-ref id="com.crawlstation.worker"/>
              </choice>
              <pkg-ref id="com.crawlstation.worker" version="${VERSION}" onConclusion="none">component.pkg</pkg-ref>
          </installer-gui-script>
          DIST_EOF

          productbuild \
            --distribution distribution.xml \
            --resources resources \
            --package-path . \
            "CrawlWorker-${VERSION}.pkg"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # 기존 릴리즈에 추가 업로드 (없으면 새로 생성)
          gh release upload "v${VERSION}" "CrawlWorker-${VERSION}.pkg" --clobber 2>/dev/null || \
          gh release create "v${VERSION}" \
            --title "CrawlWorker v${VERSION}" \
            --notes "CrawlWorker v${VERSION}" \
            --latest \
            "CrawlWorker-${VERSION}.pkg"
