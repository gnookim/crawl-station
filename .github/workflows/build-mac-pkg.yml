name: Build Mac PKG Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build-pkg:
    runs-on: macos-latest
    steps:
      - name: Create installer scripts
        run: |
          mkdir -p scripts

          cat > scripts/postinstall << 'SCRIPT_EOF'
          #!/bin/bash
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          #  CrawlStation — Mac 워커 설치 (postinstall)
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          # pkg postinstall은 root로 실행됨 — 실제 사용자 홈 찾기
          REAL_USER="${USER}"
          if [ "$REAL_USER" = "root" ]; then
              REAL_USER=$(stat -f "%Su" /dev/console 2>/dev/null || echo "$SUDO_USER")
          fi
          REAL_HOME=$(eval echo "~${REAL_USER}")

          INSTALL_DIR="${REAL_HOME}/CrawlWorker"
          STATION_URL="__STATION_URL__"
          SUPABASE_URL="__SUPABASE_URL__"
          SUPABASE_KEY="__SUPABASE_KEY__"
          PLIST_LABEL="com.crawlstation.worker"
          PLIST_PATH="${REAL_HOME}/Library/LaunchAgents/${PLIST_LABEL}.plist"
          LOG_DIR="${INSTALL_DIR}/logs"

          log() { echo "[CrawlWorker] $1"; }

          # ── 1단계: Python 확인/설치 ──
          install_python() {
              log "Python3 확인 중..."

              if command -v python3 &> /dev/null; then
                  PY_MAJOR=$(python3 -c "import sys; print(sys.version_info.major)")
                  PY_MINOR=$(python3 -c "import sys; print(sys.version_info.minor)")
                  if [ "$PY_MAJOR" -ge 3 ] && [ "$PY_MINOR" -ge 10 ]; then
                      log "Python $(python3 --version) OK"
                      return 0
                  fi
              fi

              # Homebrew
              if sudo -u "$REAL_USER" bash -c 'command -v brew' &> /dev/null; then
                  log "Homebrew로 Python 설치..."
                  sudo -u "$REAL_USER" brew install python@3.12 2>/dev/null || \
                  sudo -u "$REAL_USER" brew upgrade python@3.12 2>/dev/null
                  export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
                  if command -v python3 &> /dev/null; then
                      log "Python $(python3 --version) 설치 완료"
                      return 0
                  fi
              fi

              # python.org 공식 패키지
              log "Python 공식 인스톨러 다운로드..."
              PKG_URL="https://www.python.org/ftp/python/3.12.8/python-3.12.8-macos11.pkg"
              PKG_PATH="/tmp/python-installer.pkg"
              curl -sL "$PKG_URL" -o "$PKG_PATH"
              installer -pkg "$PKG_PATH" -target / 2>/dev/null
              rm -f "$PKG_PATH"
              export PATH="/Library/Frameworks/Python.framework/Versions/3.12/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
              hash -r 2>/dev/null

              if command -v python3 &> /dev/null; then
                  log "Python $(python3 --version) 설치 완료"
                  return 0
              fi

              log "ERROR: Python 설치 실패"
              exit 1
          }

          install_python
          PYTHON3=$(which python3)

          # ── 2단계: 워커 설치 ──
          sudo -u "$REAL_USER" mkdir -p "${INSTALL_DIR}/handlers" "${LOG_DIR}"

          log "패키지 설치..."
          sudo -u "$REAL_USER" "$PYTHON3" -m pip install --quiet playwright supabase 2>/dev/null || \
          sudo -u "$REAL_USER" "$PYTHON3" -m pip install --quiet --break-system-packages playwright supabase 2>/dev/null || true

          log "Chromium 설치..."
          sudo -u "$REAL_USER" "$PYTHON3" -m playwright install chromium 2>/dev/null || true

          log "최신 워커 다운로드..."
          FILES="worker.py handlers/__init__.py handlers/base.py handlers/kin.py handlers/blog.py handlers/serp.py"
          for f in $FILES; do
              TARGET="${INSTALL_DIR}/${f}"
              sudo -u "$REAL_USER" mkdir -p "$(dirname "${TARGET}")"
              sudo -u "$REAL_USER" curl -sS "${STATION_URL}/api/download?file=${f}" -o "${TARGET}" 2>/dev/null
          done

          # .env 생성 (최초만)
          ENV_FILE="${INSTALL_DIR}/.env"
          if [ ! -f "${ENV_FILE}" ]; then
              WORKER_ID="worker-$("$PYTHON3" -c "import uuid; print(uuid.uuid4().hex[:8])")"
              sudo -u "$REAL_USER" bash -c "cat > '${ENV_FILE}'" << ENVEOF
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_KEY=${SUPABASE_KEY}
          WORKER_ID=${WORKER_ID}
          ENVEOF
              log "워커 ID: ${WORKER_ID}"
          fi

          # ── 3단계: LaunchAgent 등록 ──
          sudo -u "$REAL_USER" launchctl unload "${PLIST_PATH}" 2>/dev/null || true

          sudo -u "$REAL_USER" mkdir -p "${REAL_HOME}/Library/LaunchAgents"
          cat > "${PLIST_PATH}" << PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key>
              <string>${PLIST_LABEL}</string>
              <key>ProgramArguments</key>
              <array>
                  <string>${PYTHON3}</string>
                  <string>${INSTALL_DIR}/worker.py</string>
              </array>
              <key>WorkingDirectory</key>
              <string>${INSTALL_DIR}</string>
              <key>RunAtLoad</key>
              <true/>
              <key>KeepAlive</key>
              <dict>
                  <key>SuccessfulExit</key>
                  <false/>
              </dict>
              <key>ThrottleInterval</key>
              <integer>10</integer>
              <key>StandardOutPath</key>
              <string>${LOG_DIR}/worker.log</string>
              <key>StandardErrorPath</key>
              <string>${LOG_DIR}/worker.err</string>
              <key>EnvironmentVariables</key>
              <dict>
                  <key>PATH</key>
                  <string>/Library/Frameworks/Python.framework/Versions/3.12/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin</string>
              </dict>
          </dict>
          </plist>
          PLISTEOF
          chown "$REAL_USER" "${PLIST_PATH}"

          sudo -u "$REAL_USER" launchctl load "${PLIST_PATH}"
          log "서비스 시작됨"

          # 제어 스크립트
          cat > "${INSTALL_DIR}/ctl.command" << 'CTLEOF'
          #!/bin/bash
          PLIST="$HOME/Library/LaunchAgents/com.crawlstation.worker.plist"
          LOG="$HOME/CrawlWorker/logs/worker.log"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  CrawlStation 워커 제어판"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  1) 상태 확인"
          echo "  2) 워커 중지"
          echo "  3) 워커 시작"
          echo "  4) 워커 재시작"
          echo "  5) 로그 보기 (최근 50줄)"
          echo "  6) 자동 실행 해제 + 완전 삭제"
          echo ""
          read -p "선택: " choice
          case $choice in
              1) launchctl list | grep crawlstation && echo "실행 중" || echo "중지됨" ;;
              2) launchctl unload "$PLIST" 2>/dev/null && echo "중지됨" || echo "이미 중지됨" ;;
              3) launchctl load "$PLIST" 2>/dev/null && echo "시작됨" || echo "이미 실행 중" ;;
              4) launchctl unload "$PLIST" 2>/dev/null; sleep 1; launchctl load "$PLIST" && echo "재시작 완료" ;;
              5) echo "--- 최근 로그 ---"; tail -50 "$LOG" 2>/dev/null || echo "로그 없음" ;;
              6) launchctl unload "$PLIST" 2>/dev/null; rm -f "$PLIST"; rm -rf "$HOME/CrawlWorker"; echo "완전 삭제 완료" ;;
          esac
          echo ""
          read -p "아무 키나 누르면 닫힘..."
          CTLEOF
          chown "$REAL_USER" "${INSTALL_DIR}/ctl.command"
          chmod +x "${INSTALL_DIR}/ctl.command"

          log "설치 완료!"
          SCRIPT_EOF

          chmod +x scripts/postinstall

      - name: Inject credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STATION_URL: ${{ secrets.STATION_URL }}
        run: |
          sed -i '' "s|__STATION_URL__|${STATION_URL:-https://crawl-station.vercel.app}|g" scripts/postinstall
          sed -i '' "s|__SUPABASE_URL__|${SUPABASE_URL}|g" scripts/postinstall
          sed -i '' "s|__SUPABASE_KEY__|${SUPABASE_KEY}|g" scripts/postinstall

      - name: Build .pkg
        run: |
          pkgbuild \
            --nopayload \
            --scripts scripts \
            --identifier com.crawlstation.worker \
            --version ${{ github.event.inputs.version }} \
            CrawlWorker-${{ github.event.inputs.version }}.pkg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release create "v${VERSION}" \
            --title "CrawlWorker v${VERSION}" \
            --notes "Mac 워커 인스톨러 v${VERSION}" \
            --latest \
            CrawlWorker-${VERSION}.pkg
