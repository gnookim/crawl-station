name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (e.g. 0.3.1)"
        required: true
        default: "0.3.1"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare payload
        shell: pwsh
        run: |
          # Python embedded 다운로드 (full Python과 동일 버전)
          $pyVer = (python --version 2>&1) -replace 'Python ',''
          Write-Host "Full Python version: $pyVer"
          Write-Host "Downloading matching embedded Python..."
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/$pyVer/python-$pyVer-embed-amd64.zip" -OutFile python-embed.zip
          New-Item -ItemType Directory -Path payload\python -Force | Out-Null
          Expand-Archive python-embed.zip -DestinationPath payload\python -Force

          # pip 활성화 + 상위 디렉토리(C:\CrawlWorker) import 경로 추가
          Get-ChildItem payload\python\python*._pth | ForEach-Object {
            $content = (Get-Content $_.FullName) -replace '#import site', 'import site'
            $content += '..'
            Set-Content $_.FullName -Value $content
            Write-Host ("Updated: " + $_.Name)
            Get-Content $_.FullName | ForEach-Object { Write-Host ("  " + $_) }
          }
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile payload\python\get-pip.py

          # install.py + run-install.bat + worker_gui.pyw 복사
          Copy-Item win-installer\install.py payload\install.py
          Copy-Item win-installer\run-install.bat payload\run-install.bat
          Copy-Item win-installer\worker_gui.pyw payload\worker_gui.pyw
          Write-Host "Payload ready"

      - name: Copy tkinter to embedded Python
        shell: pwsh
        run: |
          $fullPy = $env:pythonLocation
          $embed = "payload\python"

          # tkinter Python package
          New-Item -ItemType Directory -Path "$embed\tkinter" -Force | Out-Null
          Copy-Item -Recurse "$fullPy\Lib\tkinter\*" "$embed\tkinter\"

          # C extension and ALL DLLs from full Python (zlib1.dll 등 누락 방지)
          Copy-Item "$fullPy\DLLs\_tkinter.pyd" "$embed\"
          Copy-Item "$fullPy\DLLs\*.dll" "$embed\" -ErrorAction SilentlyContinue
          Write-Host "DLLs copied:"
          Get-ChildItem "$embed\*.dll" | ForEach-Object { Write-Host "  $_" }

          # Tcl/Tk scripts
          Copy-Item -Recurse "$fullPy\tcl" "$embed\tcl"

          # pythonw.exe (GUI 실행용 — embedded에는 미포함)
          Copy-Item "$fullPy\pythonw.exe" "$embed\pythonw.exe"
          Write-Host "tkinter + pythonw.exe copied to embedded Python"

      - name: Generate app icon
        shell: pwsh
        run: |
          pip install Pillow
          python -c "
          from PIL import Image, ImageDraw, ImageFont
          sizes = [16,32,48,64,128,256]
          imgs = []
          for s in sizes:
              img = Image.new('RGBA', (s,s), (37,99,235,255))
              d = ImageDraw.Draw(img)
              try:
                  font = ImageFont.truetype('arial.ttf', int(s*0.5))
              except:
                  font = ImageFont.load_default()
              bbox = d.textbbox((0,0), 'CW', font=font)
              tw, th = bbox[2]-bbox[0], bbox[3]-bbox[1]
              d.text(((s-tw)//2, (s-th)//2 - int(s*0.05)), 'CW', fill='white', font=font)
              imgs.append(img)
          imgs[0].save('payload\\app.ico', format='ICO', sizes=[(s,s) for s in sizes], append_images=imgs[1:])
          "
          Write-Host "App icon generated"

      - name: Inject credentials
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STATION_URL: ${{ secrets.STATION_URL }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          sed -i "s|__VERSION__|${VERSION}|g" payload/install.py
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" payload/install.py
          sed -i "s|__SUPABASE_KEY__|${SUPABASE_KEY}|g" payload/install.py
          sed -i "s|__STATION_URL__|${STATION_URL:-https://crawl-station.vercel.app}|g" payload/install.py

      - name: Create Inno Setup script
        shell: pwsh
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          $version = $env:VERSION
          $iss = @'
          [Setup]
          AppName=CrawlStation Worker
          AppVersion=__ISS_VERSION__
          AppPublisher=CrawlStation
          DefaultDirName=C:\CrawlWorker
          DisableProgramGroupPage=yes
          OutputDir=dist
          OutputBaseFilename=CrawlWorker-Setup-__ISS_VERSION__
          Compression=lzma2/ultra64
          SolidCompression=yes
          PrivilegesRequired=lowest
          SetupIconFile=payload\app.ico
          UninstallDisplayName=CrawlStation Worker
          CreateUninstallRegKey=yes

          [Files]
          Source: "payload\python\*"; DestDir: "{app}\python"; Flags: ignoreversion recursesubdirs createallsubdirs
          Source: "payload\install.py"; DestDir: "{app}"; Flags: ignoreversion
          Source: "payload\worker_gui.pyw"; DestDir: "{app}"; Flags: ignoreversion
          Source: "payload\app.ico"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\CrawlStation Worker"; Filename: "{app}\python\pythonw.exe"; Parameters: """{app}\worker_gui.pyw"""; WorkingDir: "{app}"; IconFilename: "{app}\app.ico"
          Name: "{userdesktop}\CrawlStation Worker"; Filename: "{app}\python\pythonw.exe"; Parameters: """{app}\worker_gui.pyw"""; WorkingDir: "{app}"; IconFilename: "{app}\app.ico"

          [UninstallRun]
          Filename: "taskkill"; Parameters: "/f /im python.exe"; Flags: runhidden
          Filename: "taskkill"; Parameters: "/f /im pythonw.exe"; Flags: runhidden

          [UninstallDelete]
          Type: filesandordirs; Name: "{app}"

          [Code]
          var
            InstallPage: TWizardPage;
            StepLabels: array[0..10] of TNewStaticText;
            ProgressBar: TNewProgressBar;
            StatusLabel: TNewStaticText;
            InstallDone: Boolean;

          function GetStepName(i: Integer): string;
          begin
            case i of
              0: Result := '기존 설치 확인';
              1: Result := '설치 디렉토리 생성';
              2: Result := 'Python 3.12 설치';
              3: Result := '환경 확인';
              4: Result := 'pip 설치';
              5: Result := '크롤링 패키지 설치';
              6: Result := '워커 파일 다운로드';
              7: Result := '설정 파일 생성';
              8: Result := '서비스 등록';
              9: Result := 'GUI 앱 검증';
              10: Result := '워커 실행 검증';
            else
              Result := '단계 ' + IntToStr(i);
            end;
          end;

          procedure InitializeWizard;
          var
            i, yPos: Integer;
            lbl: TNewStaticText;
          begin
            InstallPage := CreateCustomPage(wpInstalling,
              'CrawlStation Worker 설치',
              'Python, Chromium, 크롤링 패키지를 설치합니다. 5~10분 소요될 수 있습니다.');

            yPos := 8;
            for i := 0 to 10 do
            begin
              lbl := TNewStaticText.Create(InstallPage);
              lbl.Parent := InstallPage.Surface;
              lbl.Left := 12;
              lbl.Top := yPos;
              lbl.Width := InstallPage.SurfaceWidth - 24;
              lbl.Caption := '     ' + GetStepName(i);
              lbl.Font.Size := 10;
              lbl.Font.Color := $00808080;
              StepLabels[i] := lbl;
              yPos := yPos + 22;
            end;

            yPos := yPos + 12;

            ProgressBar := TNewProgressBar.Create(InstallPage);
            ProgressBar.Parent := InstallPage.Surface;
            ProgressBar.Left := 12;
            ProgressBar.Top := yPos;
            ProgressBar.Width := InstallPage.SurfaceWidth - 24;
            ProgressBar.Height := 20;
            ProgressBar.Min := 0;
            ProgressBar.Max := 11;
            ProgressBar.Position := 0;

            yPos := yPos + 30;

            StatusLabel := TNewStaticText.Create(InstallPage);
            StatusLabel.Parent := InstallPage.Surface;
            StatusLabel.Left := 12;
            StatusLabel.Top := yPos;
            StatusLabel.Width := InstallPage.SurfaceWidth - 24;
            StatusLabel.Caption := '설치 준비 중...';
            StatusLabel.Font.Size := 9;
            StatusLabel.Font.Style := [fsBold];

            InstallDone := False;
          end;

          procedure UpdateStepUI(stepNum: Integer; status: string);
          var
            i: Integer;
            prefix: string;
          begin
            for i := 0 to 10 do
            begin
              if i < stepNum then
              begin
                StepLabels[i].Caption := '  ✓  ' + GetStepName(i);
                StepLabels[i].Font.Color := $00008000;
              end
              else if i = stepNum then
              begin
                if status = 'fail' then
                begin
                  StepLabels[i].Caption := '  ✕  ' + GetStepName(i);
                  StepLabels[i].Font.Color := $000000FF;
                end
                else
                begin
                  StepLabels[i].Caption := '  ►  ' + GetStepName(i) + '...';
                  StepLabels[i].Font.Color := $00FF0000;
                end;
              end
              else
              begin
                StepLabels[i].Caption := '     ' + GetStepName(i);
                StepLabels[i].Font.Color := $00808080;
              end;
            end;

            if stepNum <= 10 then
              ProgressBar.Position := stepNum;
          end;

          procedure RunWorkerInstall;
          var
            ProgressFile, DoneFile, PyPath, ScriptPath, BatPath: string;
            Lines: TArrayOfString;
            StepNum, ResultCode, Elapsed: Integer;
            StepName, StepStatus: string;
            ExecOK: Boolean;
          begin
            PyPath := ExpandConstant('{app}\python\python.exe');
            ScriptPath := ExpandConstant('{app}\install.py');
            ProgressFile := 'C:\CrawlWorker\install.progress';
            DoneFile := ExpandConstant('{app}\install.done');
            BatPath := ExpandConstant('{app}\run-inno.bat');
            Elapsed := 0;

            DeleteFile(ProgressFile);
            DeleteFile(DoneFile);
            DeleteFile(BatPath);

            WizardForm.NextButton.Enabled := False;
            WizardForm.BackButton.Enabled := False;
            WizardForm.CancelButton.Enabled := False;

            StatusLabel.Caption := '설치 진행 중...';

            if not FileExists(PyPath) then
            begin
              StatusLabel.Caption := 'Python을 찾을 수 없습니다';
              WizardForm.NextButton.Enabled := True;
              Exit;
            end;

            if not FileExists(ScriptPath) then
            begin
              StatusLabel.Caption := 'install.py를 찾을 수 없습니다';
              WizardForm.NextButton.Enabled := True;
              Exit;
            end;

            SaveStringToFile(BatPath,
              '@echo off' + #13#10 +
              '"' + PyPath + '" "' + ScriptPath + '" --inno' + #13#10,
              False);

            ExecOK := Exec(BatPath, '', ExpandConstant('{app}'),
                           SW_HIDE, ewNoWait, ResultCode);

            if not ExecOK then
            begin
              StatusLabel.Caption := '인스톨러 시작 실패 (code: ' + IntToStr(ResultCode) + ')';
              ExecOK := Exec(PyPath, '"' + ScriptPath + '" --inno',
                             ExpandConstant('{app}'), SW_HIDE, ewNoWait, ResultCode);
              if not ExecOK then
              begin
                StatusLabel.Caption := '직접 실행도 실패 (code: ' + IntToStr(ResultCode) + ')';
                WizardForm.NextButton.Enabled := True;
                Exit;
              end;
            end;

            while not FileExists(DoneFile) do
            begin
              Sleep(500);
              Elapsed := Elapsed + 1;
              WizardForm.Update;

              if Elapsed > 1800 then
              begin
                StatusLabel.Caption := '설치 시간 초과 (15분)';
                Break;
              end;

              if FileExists(ProgressFile) then
              begin
                if LoadStringsFromFile(ProgressFile, Lines) then
                begin
                  if GetArrayLength(Lines) >= 3 then
                  begin
                    StepNum := StrToIntDef(Lines[0], 0);
                    StepName := Lines[1];
                    StepStatus := Lines[2];
                    UpdateStepUI(StepNum, StepStatus);
                    StatusLabel.Caption := StepName;
                  end;
                end;
              end;
            end;

            if FileExists(DoneFile) then
            begin
              if LoadStringsFromFile(DoneFile, Lines) then
              begin
                if (GetArrayLength(Lines) > 0) and (Lines[0] = '0') then
                begin
                  UpdateStepUI(11, 'done');
                  ProgressBar.Position := 11;
                  StatusLabel.Caption := '설치 완료! 워커가 실행 중입니다.';
                  StatusLabel.Font.Color := $00008000;
                end
                else
                begin
                  StatusLabel.Caption := '설치 중 일부 문제 발생';
                  StatusLabel.Font.Color := $000000FF;
                end;
              end;
            end
            else
            begin
              StatusLabel.Caption := '설치 시간 초과 또는 오류';
              StatusLabel.Font.Color := $000000FF;
            end;

            WizardForm.NextButton.Enabled := True;
            WizardForm.NextButton.Caption := '완료';
            WizardForm.CancelButton.Enabled := False;
            InstallDone := True;
          end;

          function ShouldSkipPage(PageID: Integer): Boolean;
          begin
            if (PageID = wpFinished) and InstallDone then
              Result := True
            else
              Result := False;
          end;

          procedure CurPageChanged(CurPageID: Integer);
          begin
            if (CurPageID = InstallPage.ID) and (not InstallDone) then
              RunWorkerInstall;
          end;
          '@

          $iss = $iss.Replace('__ISS_VERSION__', $version)

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Set-Content -Path "setup.iss" -Value $iss -Encoding UTF8
          Write-Host "Inno Setup script created"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          # Inno Setup is pre-installed on windows-latest
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
          $ver = "${{ github.event.inputs.version }}"
          $exe = "dist\CrawlWorker-Setup-${ver}.exe"
          $size = (Get-Item $exe).Length / 1MB
          Write-Host ("Built: CrawlWorker-Setup-${ver}.exe ({0:N1} MB)" -f $size)

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          EXE="dist/CrawlWorker-Setup-${VERSION}.exe"
          gh release upload "v${VERSION}" "${EXE}" --clobber 2>/dev/null || \
          gh release create "v${VERSION}" \
            --title "CrawlWorker v${VERSION}" \
            --notes "CrawlWorker v${VERSION}" \
            --latest \
            "${EXE}"
