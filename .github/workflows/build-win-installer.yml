name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (e.g. 0.3.1)"
        required: true
        default: "0.3.1"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Python embeddable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip" -OutFile python-embed.zip
          New-Item -ItemType Directory -Path payload\python -Force | Out-Null
          Expand-Archive python-embed.zip -DestinationPath payload\python -Force
          # pip 활성화
          Get-ChildItem payload\python\*.pth | ForEach-Object {
            (Get-Content $_.FullName) -replace '#import site', 'import site' | Set-Content $_.FullName
          }
          # get-pip 다운로드
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile payload\python\get-pip.py
          Write-Host "Python embedded ready"

      - name: Inject credentials into installer
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STATION_URL: ${{ secrets.STATION_URL }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          cp win-installer/install.py payload/install.py
          sed -i "s|__VERSION__|${VERSION}|g" payload/install.py
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" payload/install.py
          sed -i "s|__SUPABASE_KEY__|${SUPABASE_KEY}|g" payload/install.py
          sed -i "s|__STATION_URL__|${STATION_URL:-https://crawl-station.vercel.app}|g" payload/install.py
          echo "Credentials injected"

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          pip install pyinstaller --quiet
          pyinstaller --onedir --name "CrawlWorker-Setup" --add-data "payload\python;python" payload\install.py
          Compress-Archive -Path "dist\CrawlWorker-Setup\*" -DestinationPath "CrawlWorker-Setup-Windows.zip"
          $size = (Get-Item "CrawlWorker-Setup-Windows.zip").Length / 1MB
          Write-Host ("Built: CrawlWorker-Setup-Windows.zip ({0:N1} MB)" -f $size)

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release upload "v${VERSION}" "CrawlWorker-Setup-Windows.zip" --clobber 2>/dev/null || \
          gh release create "v${VERSION}" \
            --title "CrawlWorker v${VERSION}" \
            --notes "CrawlWorker v${VERSION}" \
            --latest \
            "CrawlWorker-Setup-Windows.zip"
