name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (e.g. 0.3.1)"
        required: true
        default: "0.3.1"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create installer package
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STATION_URL: ${{ secrets.STATION_URL }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          $stationUrl = if ($env:STATION_URL) { $env:STATION_URL } else { "https://crawl-station.vercel.app" }

          # ── 1. Python embedded 다운로드 ──
          Write-Host "📦 Python embedded 다운로드..."
          $pyUrl = "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip"
          Invoke-WebRequest -Uri $pyUrl -OutFile python-embed.zip
          Expand-Archive python-embed.zip -DestinationPath package\python -Force

          # pip 활성화 (python312._pth 수정)
          $pthFile = Get-ChildItem package\python\*.pth | Select-Object -First 1
          if ($pthFile) {
            $content = Get-Content $pthFile.FullName
            $content = $content -replace '#import site', 'import site'
            Set-Content $pthFile.FullName $content
          }

          # get-pip.py 다운로드 + 설치
          Write-Host "📦 pip 설치..."
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile package\python\get-pip.py
          & package\python\python.exe package\python\get-pip.py --quiet 2>$null

          # ── 2. pip 패키지 사전 설치 ──
          Write-Host "📦 playwright, supabase 사전 설치..."
          & package\python\python.exe -m pip install --quiet playwright supabase 2>$null

          Write-Host "🌐 Chromium 사전 설치..."
          & package\python\python.exe -m playwright install chromium 2>$null

          # ── 3. 인스톨러 스크립트 생성 ──
          Write-Host "📝 인스톨러 스크립트 생성..."
          $installerScript = @"
          import os, sys, shutil, uuid, subprocess, urllib.request, platform

          SUPABASE_URL = "$($env:SUPABASE_URL)"
          SUPABASE_KEY = "$($env:SUPABASE_KEY)"
          STATION_URL = "$stationUrl"
          VERSION = "$($env:VERSION)"
          INSTALL_DIR = r"C:\CrawlWorker"
          PYTHON_DIR = os.path.join(INSTALL_DIR, "python")

          def main():
              print("\n" + "=" * 50)
              print("  CrawlStation Worker Installer v" + VERSION)
              print("=" * 50 + "\n")

              # 설치 디렉토리 생성
              for d in ["handlers", "logs"]:
                  os.makedirs(os.path.join(INSTALL_DIR, d), exist_ok=True)
              print(f"[1/6] 설치 경로: {INSTALL_DIR}")

              # Python embedded 복사
              src_python = os.path.join(os.path.dirname(os.path.abspath(__file__)), "python")
              if os.path.exists(src_python) and not os.path.exists(PYTHON_DIR):
                  print("[2/6] Python 복사 중...")
                  shutil.copytree(src_python, PYTHON_DIR)
              elif os.path.exists(PYTHON_DIR):
                  print("[2/6] Python 이미 설치됨")
              else:
                  print("[2/6] ERROR: Python을 찾을 수 없습니다")
                  input("아무 키나 누르세요...")
                  sys.exit(1)
              print("  Python 3.12 (embedded)")

              py = os.path.join(PYTHON_DIR, "python.exe")

              # 패키지 확인 (이미 사전설치됨)
              print("[3/6] 패키지 확인...")
              subprocess.run([py, "-m", "pip", "install", "--quiet", "playwright", "supabase"],
                  capture_output=True)
              print("  playwright, supabase OK")

              # Chromium 확인
              print("[4/6] Chromium 확인...")
              subprocess.run([py, "-m", "playwright", "install", "chromium"],
                  capture_output=True)
              print("  Chromium OK")

              # 워커 파일 다운로드
              print("[5/6] 워커 파일 다운로드...")
              files = ["worker.py", "handlers/__init__.py", "handlers/base.py",
                       "handlers/kin.py", "handlers/blog.py", "handlers/serp.py"]
              for f in files:
                  t = os.path.join(INSTALL_DIR, f)
                  os.makedirs(os.path.dirname(t), exist_ok=True)
                  try:
                      urllib.request.urlretrieve(f"{STATION_URL}/api/download?file={f}", t)
                      print(f"  {f}")
                  except Exception as e:
                      print(f"  WARN {f}: {e}")

              # .env 생성
              env_path = os.path.join(INSTALL_DIR, ".env")
              if not os.path.exists(env_path):
                  wid = f"worker-{uuid.uuid4().hex[:8]}"
                  with open(env_path, "w") as ef:
                      ef.write(f"SUPABASE_URL={SUPABASE_URL}\nSUPABASE_KEY={SUPABASE_KEY}\nWORKER_ID={wid}\n")
                  print(f"\n  Worker ID: {wid}")

              # [6/6] 서비스 등록
              print("[6/6] 서비스 등록...")

              # 시작프로그램 등록 (레지스트리)
              try:
                  import winreg
                  key = winreg.OpenKey(winreg.HKEY_CURRENT_USER,
                      r"Software\Microsoft\Windows\CurrentVersion\Run", 0, winreg.KEY_SET_VALUE)
                  cmd = f'"{py}" "{os.path.join(INSTALL_DIR, "worker.py")}"'
                  winreg.SetValueEx(key, "CrawlStationWorker", 0, winreg.REG_SZ, cmd)
                  winreg.CloseKey(key)
                  print("  부팅 시 자동 시작 등록")
              except Exception as e:
                  print(f"  WARN 자동시작 등록 실패: {e}")

              # 바탕화면 바로가기
              desktop = os.path.join(os.path.expanduser("~"), "Desktop")
              # 시작
              with open(os.path.join(desktop, "CrawlWorker.bat"), "w", encoding="utf-8") as f:
                  f.write(f'@echo off\ncd /d "{INSTALL_DIR}"\n"{py}" worker.py\n')
              # 중지
              with open(os.path.join(desktop, "CrawlWorker 중지.bat"), "w", encoding="utf-8") as f:
                  f.write('@echo off\ntaskkill /f /im python.exe 2>nul\necho Stopped.\npause\n')
              # 삭제
              with open(os.path.join(desktop, "CrawlWorker 삭제.bat"), "w", encoding="utf-8") as f:
                  f.write(f'@echo off\ntaskkill /f /im python.exe 2>nul\n')
                  f.write(f'reg delete "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run" /v CrawlStationWorker /f 2>nul\n')
                  f.write(f'rmdir /s /q "{INSTALL_DIR}" 2>nul\n')
                  f.write(f'del "%USERPROFILE%\\Desktop\\CrawlWorker.bat" 2>nul\n')
                  f.write(f'del "%USERPROFILE%\\Desktop\\CrawlWorker 중지.bat" 2>nul\n')
                  f.write('echo Uninstalled.\npause\ndel "%~f0" 2>nul\n')
              print("  바탕화면 바로가기 생성 (시작/중지/삭제)")

              # 즉시 실행
              subprocess.Popen([py, os.path.join(INSTALL_DIR, "worker.py")],
                  cwd=INSTALL_DIR, creationflags=0x00000010)

              print("\n" + "=" * 50)
              print("  설치 완료! 워커가 실행 중입니다.")
              print()
              print("  - 지금 바로 실행됨")
              print("  - PC 부팅 시 자동 시작")
              print("  - 바탕화면에서 제어 가능")
              print("  - 새 버전 자동 업데이트")
              print(f"  - CrawlStation: {STATION_URL}")
              print("=" * 50 + "\n")
              input("아무 키나 누르면 닫힙니다...")

          if __name__ == "__main__":
              main()
          "@
          Set-Content -Path "package\install.py" -Value $installerScript -Encoding UTF8

          # ── 4. 런처 (install.py를 embedded python으로 실행) ──
          $launcherScript = @"
          import os, sys, subprocess
          base = os.path.dirname(os.path.abspath(__file__))
          py = os.path.join(base, "python", "python.exe")
          script = os.path.join(base, "install.py")
          subprocess.run([py, script])
          "@
          Set-Content -Path "package\launcher.py" -Value $launcherScript -Encoding UTF8

          Write-Host "✅ 패키지 준비 완료"
          Get-ChildItem package -Recurse | Where-Object { -not $_.PSIsContainer } | Measure-Object | Select-Object -ExpandProperty Count | ForEach-Object { Write-Host "  파일 수: $_" }

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          pip install pyinstaller
          # launcher.py를 exe로 빌드하면서 package/ 전체를 번들에 포함
          pyinstaller --onefile --name "CrawlWorker-Setup" `
            --add-data "package\python;python" `
            --add-data "package\install.py;." `
            --hidden-import urllib.request `
            --hidden-import uuid `
            package\launcher.py
          Write-Host "📦 exe 크기:"
          Get-Item dist\CrawlWorker-Setup.exe | Select-Object Length

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release upload "v${VERSION}" "dist/CrawlWorker-Setup.exe" --clobber 2>/dev/null || \
          gh release create "v${VERSION}" \
            --title "CrawlWorker v${VERSION}" \
            --notes "CrawlWorker v${VERSION} — Mac + Windows" \
            --latest \
            "dist/CrawlWorker-Setup.exe"
