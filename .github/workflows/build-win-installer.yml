name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (e.g. 0.3.1)"
        required: true
        default: "0.3.1"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare payload
        shell: pwsh
        run: |
          # Python embedded 다운로드
          Write-Host "Downloading Python embedded..."
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip" -OutFile python-embed.zip
          New-Item -ItemType Directory -Path payload\python -Force | Out-Null
          Expand-Archive python-embed.zip -DestinationPath payload\python -Force

          # pip 활성화
          Get-ChildItem payload\python\*.pth | ForEach-Object {
            (Get-Content $_.FullName) -replace '#import site', 'import site' | Set-Content $_.FullName
          }
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile payload\python\get-pip.py

          # install.py + run-install.bat 복사
          Copy-Item win-installer\install.py payload\install.py
          Copy-Item win-installer\run-install.bat payload\run-install.bat
          Write-Host "Payload ready"

      - name: Inject credentials
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STATION_URL: ${{ secrets.STATION_URL }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          sed -i "s|__VERSION__|${VERSION}|g" payload/install.py
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" payload/install.py
          sed -i "s|__SUPABASE_KEY__|${SUPABASE_KEY}|g" payload/install.py
          sed -i "s|__STATION_URL__|${STATION_URL:-https://crawl-station.vercel.app}|g" payload/install.py

      - name: Create Inno Setup script
        shell: pwsh
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          $version = $env:VERSION
          $iss = @'
          [Setup]
          AppName=CrawlStation Worker
          AppVersion=__ISS_VERSION__
          AppPublisher=CrawlStation
          DefaultDirName=C:\CrawlWorker
          DisableProgramGroupPage=yes
          OutputDir=dist
          OutputBaseFilename=CrawlWorker-Setup
          Compression=lzma2/ultra64
          SolidCompression=yes
          PrivilegesRequired=lowest
          SetupIconFile=
          UninstallDisplayName=CrawlStation Worker
          CreateUninstallRegKey=yes

          [Files]
          Source: "payload\python\*"; DestDir: "{app}\python"; Flags: ignoreversion recursesubdirs createallsubdirs
          Source: "payload\install.py"; DestDir: "{app}"; Flags: ignoreversion

          [UninstallRun]
          Filename: "taskkill"; Parameters: "/f /im python.exe"; Flags: runhidden

          [UninstallDelete]
          Type: filesandordirs; Name: "{app}"

          [Code]
          var
            InstallPage: TWizardPage;
            InstallMemo: TNewMemo;
            StatusLabel: TNewStaticText;
            InstallDone: Boolean;

          procedure InitializeWizard;
          begin
            InstallPage := CreateCustomPage(wpInstalling,
              'CrawlStation Worker 설치',
              'Python, Chromium, 크롤링 패키지를 설치합니다. 5~10분 소요될 수 있습니다.');

            StatusLabel := TNewStaticText.Create(InstallPage);
            StatusLabel.Parent := InstallPage.Surface;
            StatusLabel.Left := 0;
            StatusLabel.Top := 0;
            StatusLabel.Width := InstallPage.SurfaceWidth;
            StatusLabel.Caption := '설치 준비 중...';
            StatusLabel.Font.Style := [fsBold];

            InstallMemo := TNewMemo.Create(InstallPage);
            InstallMemo.Parent := InstallPage.Surface;
            InstallMemo.Left := 0;
            InstallMemo.Top := 24;
            InstallMemo.Width := InstallPage.SurfaceWidth;
            InstallMemo.Height := InstallPage.SurfaceHeight - 24;
            InstallMemo.ReadOnly := True;
            InstallMemo.ScrollBars := ssVertical;
            InstallMemo.Font.Name := 'Consolas';
            InstallMemo.Font.Size := 9;
            InstallMemo.Color := $001E1E1E;
            InstallMemo.Font.Color := $0000FF00;
            InstallMemo.WordWrap := False;

            InstallDone := False;
          end;

          procedure RunWorkerInstall;
          var
            LogFile, DoneFile, PyPath, ScriptPath, BatPath: string;
            Lines: TArrayOfString;
            LastCount, i, ResultCode, Elapsed: Integer;
            ExecOK: Boolean;
          begin
            PyPath := ExpandConstant('{app}\python\python.exe');
            ScriptPath := ExpandConstant('{app}\install.py');
            LogFile := ExpandConstant('{app}\install.log');
            DoneFile := ExpandConstant('{app}\install.done');
            BatPath := ExpandConstant('{app}\run-inno.bat');
            LastCount := 0;
            Elapsed := 0;

            DeleteFile(LogFile);
            DeleteFile(DoneFile);
            DeleteFile(BatPath);

            WizardForm.NextButton.Enabled := False;
            WizardForm.BackButton.Enabled := False;
            WizardForm.CancelButton.Enabled := False;

            StatusLabel.Caption := '설치 진행 중...';
            InstallMemo.Lines.Add('Python: ' + PyPath);
            InstallMemo.Lines.Add('Script: ' + ScriptPath);
            InstallMemo.Lines.Add('');

            if not FileExists(PyPath) then
            begin
              InstallMemo.Lines.Add('[ERROR] python.exe not found!');
              StatusLabel.Caption := 'Python을 찾을 수 없습니다';
              WizardForm.NextButton.Enabled := True;
              Exit;
            end;

            if not FileExists(ScriptPath) then
            begin
              InstallMemo.Lines.Add('[ERROR] install.py not found!');
              StatusLabel.Caption := 'install.py를 찾을 수 없습니다';
              WizardForm.NextButton.Enabled := True;
              Exit;
            end;

            SaveStringToFile(BatPath,
              '@echo off' + #13#10 +
              '"' + PyPath + '" "' + ScriptPath + '" --inno' + #13#10,
              False);

            InstallMemo.Lines.Add('Starting installer...');
            InstallMemo.Lines.Add('');

            ExecOK := Exec(BatPath, '', ExpandConstant('{app}'),
                           SW_HIDE, ewNoWait, ResultCode);

            if not ExecOK then
            begin
              InstallMemo.Lines.Add('[ERROR] Failed to start (code: ' + IntToStr(ResultCode) + ')');
              InstallMemo.Lines.Add('Trying direct exec...');
              ExecOK := Exec(PyPath, '"' + ScriptPath + '" --inno',
                             ExpandConstant('{app}'), SW_HIDE, ewNoWait, ResultCode);
              if not ExecOK then
              begin
                InstallMemo.Lines.Add('[ERROR] Direct exec also failed (code: ' + IntToStr(ResultCode) + ')');
                StatusLabel.Caption := '인스톨러 시작 실패';
                WizardForm.NextButton.Enabled := True;
                Exit;
              end;
            end;

            while not FileExists(DoneFile) do
            begin
              Sleep(500);
              Elapsed := Elapsed + 1;
              WizardForm.Update;

              if Elapsed > 1800 then
              begin
                StatusLabel.Caption := '설치 시간 초과 (15분)';
                Break;
              end;

              if (Elapsed = 20) and (not FileExists(LogFile)) then
                InstallMemo.Lines.Add('Waiting for log file...');

              if FileExists(LogFile) then
              begin
                if LoadStringsFromFile(LogFile, Lines) then
                begin
                  if GetArrayLength(Lines) > LastCount then
                  begin
                    for i := LastCount to GetArrayLength(Lines) - 1 do
                      InstallMemo.Lines.Add(Lines[i]);
                    LastCount := GetArrayLength(Lines);
                    SendMessage(InstallMemo.Handle, 277, 7, 0);
                  end;
                end;
              end;
            end;

            if FileExists(LogFile) then
            begin
              if LoadStringsFromFile(LogFile, Lines) then
              begin
                for i := LastCount to GetArrayLength(Lines) - 1 do
                  InstallMemo.Lines.Add(Lines[i]);
              end;
            end;

            if FileExists(DoneFile) then
            begin
              if LoadStringsFromFile(DoneFile, Lines) then
              begin
                if (GetArrayLength(Lines) > 0) and (Lines[0] = '0') then
                  StatusLabel.Caption := '설치 완료!'
                else
                  StatusLabel.Caption := '설치 중 일부 문제 발생';
              end;
            end
            else
              StatusLabel.Caption := '설치 시간 초과 또는 오류';

            WizardForm.NextButton.Enabled := True;
            WizardForm.CancelButton.Enabled := True;
            InstallDone := True;
          end;

          procedure CurPageChanged(CurPageID: Integer);
          begin
            if (CurPageID = InstallPage.ID) and (not InstallDone) then
              RunWorkerInstall;
          end;
          '@

          $iss = $iss.Replace('__ISS_VERSION__', $version)

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Set-Content -Path "setup.iss" -Value $iss -Encoding UTF8
          Write-Host "Inno Setup script created"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          # Inno Setup is pre-installed on windows-latest
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
          $size = (Get-Item "dist\CrawlWorker-Setup.exe").Length / 1MB
          Write-Host ("Built: CrawlWorker-Setup.exe ({0:N1} MB)" -f $size)

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          gh release upload "v${VERSION}" "dist/CrawlWorker-Setup.exe" --clobber 2>/dev/null || \
          gh release create "v${VERSION}" \
            --title "CrawlWorker v${VERSION}" \
            --notes "CrawlWorker v${VERSION}" \
            --latest \
            "dist/CrawlWorker-Setup.exe"
